<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <a href="#" class="logo" onclick="showPage('catalog')">🛒 ShopEase</a>
    <div class="nav-links">
      <a href="#" onclick="showPage('catalog')">Products</a>
      <a href="#" onclick="showPage('cart')">Cart <span id="cart-badge">0</span></a>
      <a href="#" id="orders-link" onclick="showPage('orders')" style="display:none">My Orders</a>
      <a href="#" id="admin-link" onclick="showPage('admin')" style="display:none">Admin</a>
      <a href="#" id="auth-link" onclick="showPage('auth')">Login</a>
      <a href="#" id="logout-link" onclick="logout()" style="display:none">Logout</a>
    </div>
  </nav>

  <!-- Catalog Page -->
  <section id="page-catalog" class="page active">
    <div class="search-bar">
      <input id="search-input" type="text" placeholder="Search products..." oninput="loadProducts()"/>
      <select id="category-filter" onchange="loadProducts()">
        <option value="">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Books">Books</option>
        <option value="Home">Home</option>
      </select>
    </div>
    <div id="product-grid" class="product-grid"></div>
  </section>

  <!-- Cart Page -->
  <section id="page-cart" class="page">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <div id="cart-summary" class="cart-summary"></div>
  </section>

  <!-- Checkout Page -->
  <section id="page-checkout" class="page">
    <h2>Checkout</h2>
    <div class="checkout-grid">
      <div>
        <h3>Shipping Address</h3>
        <form id="checkout-form" onsubmit="processPayment(event)">
          <input name="street" placeholder="Street Address" required/>
          <input name="city" placeholder="City" required/>
          <input name="state" placeholder="State" required/>
          <input name="zip" placeholder="ZIP Code" required/>
          <h3 style="margin-top:1rem">Payment Details</h3>
          <input id="card-number" placeholder="Card Number (16 digits)" maxlength="19" oninput="formatCard(this)" required/>
          <div style="display:flex;gap:0.8rem">
            <input id="card-expiry" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)" required/>
            <input id="card-cvv" placeholder="CVV" maxlength="3" type="password" required/>
          </div>
          <div class="card-icons">💳 Visa &nbsp; 💳 Mastercard &nbsp; 💳 Amex</div>
          <button type="submit" class="btn-primary" id="pay-btn">Pay Now</button>
        </form>
      </div>
      <div class="order-summary-box">
        <h3>Order Summary</h3>
        <div id="checkout-summary"></div>
      </div>
    </div>
  </section>

  <!-- Orders Page -->
  <section id="page-orders" class="page">
    <h2>My Orders</h2>
    <div id="orders-list"></div>
  </section>

  <!-- Product Detail / Reviews Modal -->
  <div id="review-modal" class="modal-overlay" style="display:none" onclick="closeReviewModal(event)">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('review-modal').style.display='none'">✕</button>
      <h3 id="modal-product-name"></h3>
      <div id="modal-avg-rating" class="avg-rating"></div>
      <div id="reviews-list"></div>
      <div id="review-form-wrap">
        <h4>Write a Review</h4>
        <div class="star-selector" id="star-selector">
          <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span>
          <span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span>
          <span onclick="setRating(5)">★</span>
        </div>
        <textarea id="review-comment" placeholder="Share your experience..."></textarea>
        <button class="btn-primary" onclick="submitReview()">Submit Review</button>
      </div>
    </div>
  </div>

  <!-- Admin Page -->
  <section id="page-admin" class="page">
    <h2>Admin Panel</h2>
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="adminTab('products')">Products</button>
      <button class="tab-btn" onclick="adminTab('orders')">Orders</button>
    </div>

    <div id="admin-products">
      <h3>Add / Edit Product</h3>
      <form id="product-form" onsubmit="saveProduct(event)">
        <input type="hidden" id="edit-id"/>
        <input id="p-name" placeholder="Product Name" required/>
        <input id="p-price" type="number" placeholder="Price" step="0.01" required/>
        <input id="p-stock" type="number" placeholder="Stock" required/>
        <input id="p-category" placeholder="Category"/>
        <input id="p-image" placeholder="Image URL"/>
        <textarea id="p-desc" placeholder="Description"></textarea>
        <button type="submit" class="btn-primary">Save Product</button>
        <button type="button" onclick="resetProductForm()">Cancel</button>
      </form>
      <div id="admin-product-list" class="product-grid"></div>
    </div>

    <div id="admin-orders" style="display:none">
      <div id="admin-orders-list"></div>
    </div>
  </section>

  <!-- Auth Page -->
  <section id="page-auth" class="page">
    <div class="auth-box">
      <div class="auth-toggle">
        <button class="tab-btn active" onclick="authMode('login')">Login</button>
        <button class="tab-btn" onclick="authMode('register')">Register</button>
      </div>
      <form id="login-form" onsubmit="login(event)">
        <h3>Login</h3>
        <input id="l-email" type="email" placeholder="Email" required/>
        <input id="l-password" type="password" placeholder="Password" required/>
        <button type="submit" class="btn-primary">Login</button>
      </form>
      <form id="register-form" onsubmit="register(event)" style="display:none">
        <h3>Register</h3>
        <input id="r-name" placeholder="Full Name" required/>
        <input id="r-email" type="email" placeholder="Email" required/>
        <input id="r-password" type="password" placeholder="Password" required/>
        <select id="r-role"><option value="user">User</option><option value="admin">Admin</option></select>
        <button type="submit" class="btn-primary">Register</button>
      </form>
      <p id="auth-msg" class="msg"></p>
    </div>
  </section>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
